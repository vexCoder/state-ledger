<div class="flex min-h-screen flex-col bg-background text-foreground">
  <header class="border-b border-border">
    <nav class="flex items-center px-6 py-3">
      <button
        type="button"
        class="-ml-2 inline-flex h-9 w-9 items-center justify-center rounded-md transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring"
        aria-label="Toggle navigation menu"
        [attr.aria-expanded]="menuOpen()"
        (click)="toggleMenu()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </nav>
  </header>

  @if (menuOpen()) {
    <div class="fixed inset-0 z-40 bg-black/30" (click)="closeMenu()"></div>
    <aside class="fixed inset-y-0 left-0 z-50 flex w-80 flex-col rounded-r-xl border-r border-border bg-background shadow-lg">
      <div class="border-b border-border px-6 py-4">
        <button
          type="button"
          class="-ml-2 inline-flex h-9 w-9 items-center justify-center rounded-md transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring"
          aria-label="Close navigation menu"
          (click)="closeMenu()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
      <nav class="flex-1 overflow-y-auto">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            class="block border-b border-border px-6 py-4 text-base transition-colors hover:bg-accent hover:text-accent-foreground"
            (click)="closeMenu()"
            >{{ item.label }}</a
          >
        }
      </nav>
    </aside>
  }

  <section class="border-b border-border bg-muted/40">
    <div class="px-6 py-6">
      <h1 class="text-2xl font-semibold tracking-tight">{{ pageTitle() }}</h1>
    </div>
  </section>

  <main class="flex flex-1 flex-col">
    <router-outlet />
  </main>

  <app-debug-panel />
</div>
